<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0f766e" />
  <style id="mobile-enhance">
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; text-size-adjust: 100%; }
    body { margin: 0; overflow-x: hidden; }
    img, video, iframe, svg, canvas, table { max-width: 100%; height: auto; }
    input, select, textarea, button { max-width: 100%; font-size: 16px; }
    @media (max-width: 768px) {
      body { padding-left: 12px; padding-right: 12px; }
      h1 { font-size: 1.5rem; }
    }
  </style>
  <meta charset="UTF-8">
  <title>Investment Tracker</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <h1>📊 Stock & ETF Investment Tracker</h1>

    <div class="button-row">
      <button id="export-csv">📤 Export CSV</button>
      <button id="load-google">🔄 Load from Google Sheets</button>
      <select id="sort-option">
        <option value="">Sort By</option>
        <option value="ticker">Ticker (A-Z)</option>
        <option value="yield">Yield (High → Low)</option>
        <option value="value">Market Value</option>
        <option value="dividend">Monthly Dividend</option>
      </select>
      <select id="filter-option">
        <option value="">Show All</option>
        <option value="low-yield">Yield < 2%</option>
        <option value="high-yield">Yield ≥ 2%</option>
      </select>
    </div>

    <form id="add-stock-form">
      <input type="text" id="ticker" placeholder="Ticker" required>
      <input type="number" id="shares" placeholder="Shares" step="0.01" required>
      <input type="number" id="price" placeholder="Price" step="0.01" required>
      <input type="number" id="yield" placeholder="Yield (%)" step="0.01" required>
      <button type="submit">➕ Add</button>
    </form>

    <div class="suggest-section">
      <h2>💡 Suggest Best Halal Portfolio</h2>
      <input type="number" id="invest-amount" placeholder="Total Amount to Invest ($)" min="1" step="0.01">
      <select id="optimize-mode">
        <option value="dividends">Maximize Dividends</option>
        <option value="price">Cheapest Price</option>
        <option value="diversified">Diversified</option>
      </select>
      <button id="suggest-portfolio">Suggest Portfolio</button>
      <div id="suggested-portfolio"></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Ticker</th>
          <th>Shares</th>
          <th>Price</th>
          <th>Yield (%)</th>
          <th>Annual Div</th>
          <th>Monthly Div</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="portfolio-body"></tbody>
    </table>

    <div class="chart-row">
      <div class="chart-box">
        <h3>📊 Monthly Dividend</h3>
        <canvas id="barChart"></canvas>
      </div>
      <div class="chart-box">
        <h3>🧁 Pie Chart View: 
          <select id="pie-toggle">
            <option value="dividend">Dividend %</option>
            <option value="value">Market Value %</option>
          </select>
        </h3>
        <canvas id="pieChart"></canvas>
      </div>
    </div>

    <p id="sync-status" class="sync-status"></p>
  </div>

  <script src="app.js"></script>

  <div class="resources">
    <h2>Resources</h2>
    <ul>
      <li><a href="https://investron.ai/" target="_blank">Investron.ai</a></li>
      <li><a href="https://stockify.app/" target="_blank">Stockify App</a></li>
      <li><a href="https://stockstracker.app/" target="_blank">Stockstracker</a></li>
      <li><a href="https://www.investopedia.com/" target="_blank">Investopedia</a></li>
      <li><a href="https://finance.yahoo.com/" target="_blank">Yahoo Finance</a></li>
    </ul>
  </div>
</body>
</html>
